name: Docs

# Builds the DocFX site (guides + recipes + API reference generated from the published
# RedPdf package) and deploys it to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      # Self-contained publish puts the framework assemblies next to RedPdf.dll, which
      # docfx needs to resolve references when generating metadata from an assembly.
      - name: Restore the RedPdf package for the API reference
        run: dotnet publish website/apiref -c Release -r linux-x64 --self-contained -o website/apiref/bin/publish
      - run: dotnet tool install -g docfx
      - run: docfx website/docfx.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
